<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Touch Ball Physics</title>
    <style>
      :root {
        color-scheme: dark;
        --panel: rgba(13, 18, 28, 0.86);
        --panel-border: rgba(255, 255, 255, 0.14);
        --text: #f8fafc;
        --muted: #cbd5e1;
        --add: #22c55e;
        --add-strong: #16a34a;
        --clear: #f97316;
        --clear-strong: #ea580c;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #0b1020;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        touch-action: none;
        user-select: none;
      }

      #stage {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        display: block;
        background:
          radial-gradient(circle at 18% 14%, rgba(34, 197, 94, 0.20), transparent 28%),
          radial-gradient(circle at 82% 12%, rgba(249, 115, 22, 0.16), transparent 24%),
          linear-gradient(145deg, #101827 0%, #1f2937 46%, #111827 100%);
      }

      .controls {
        position: fixed;
        z-index: 2;
        left: max(18px, env(safe-area-inset-left));
        right: max(18px, env(safe-area-inset-right));
        bottom: max(18px, env(safe-area-inset-bottom));
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
        padding: 14px;
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        background: var(--panel);
        backdrop-filter: blur(14px);
        box-shadow: 0 16px 42px rgba(0, 0, 0, 0.28);
      }

      button {
        min-height: 76px;
        border: 0;
        border-radius: 8px;
        color: var(--text);
        font-size: 24px;
        font-weight: 800;
        letter-spacing: 0;
        cursor: pointer;
        touch-action: manipulation;
        box-shadow: inset 0 -5px 0 rgba(0, 0, 0, 0.20);
        transition:
          transform 120ms ease,
          filter 120ms ease,
          box-shadow 120ms ease;
      }

      button:active {
        transform: translateY(3px);
        box-shadow: inset 0 -2px 0 rgba(0, 0, 0, 0.20);
      }

      button:focus-visible {
        outline: 4px solid rgba(255, 255, 255, 0.72);
        outline-offset: 3px;
      }

      .add {
        background: linear-gradient(180deg, var(--add), var(--add-strong));
      }

      .clear {
        background: linear-gradient(180deg, var(--clear), var(--clear-strong));
      }

      .counter {
        position: fixed;
        z-index: 2;
        top: max(16px, env(safe-area-inset-top));
        right: max(18px, env(safe-area-inset-right));
        min-width: 108px;
        padding: 12px 16px;
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        background: var(--panel);
        color: var(--muted);
        font-size: 18px;
        font-weight: 700;
        text-align: center;
        backdrop-filter: blur(14px);
      }

      .status {
        position: fixed;
        z-index: 2;
        top: calc(max(16px, env(safe-area-inset-top)) + 58px);
        right: max(18px, env(safe-area-inset-right));
        max-width: min(260px, calc(100vw - 36px));
        padding: 10px 14px;
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        background: var(--panel);
        color: var(--text);
        font-size: 16px;
        font-weight: 800;
        line-height: 1.25;
        text-align: center;
        opacity: 0;
        transform: translateY(-6px);
        transition:
          opacity 180ms ease,
          transform 180ms ease;
        pointer-events: none;
        backdrop-filter: blur(14px);
      }

      .status.is-visible {
        opacity: 1;
        transform: translateY(0);
      }

      @media (min-width: 760px) {
        .controls {
          left: auto;
          grid-template-columns: 190px 190px;
        }

        button {
          min-height: 86px;
          font-size: 26px;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div class="counter" aria-live="polite"><span id="ballCount">0</span> Balls</div>
    <div class="status" id="statusMessage" aria-live="polite"></div>
    <div class="controls" aria-label="Physics controls">
      <button class="add" id="addBall" type="button">Add Ball</button>
      <button class="clear" id="clearBalls" type="button">Clear</button>
    </div>

    <script src="./matter.min.js"></script>
    <script>
      const {
        Bodies,
        Body,
        Engine,
        Events,
        Mouse,
        MouseConstraint,
        Render,
        Runner,
        World
      } = Matter;

      const canvas = document.querySelector("#stage");
      const controls = document.querySelector(".controls");
      const addButton = document.querySelector("#addBall");
      const clearButton = document.querySelector("#clearBalls");
      const ballCount = document.querySelector("#ballCount");
      const statusMessage = document.querySelector("#statusMessage");

      const engine = Engine.create();
      engine.gravity.y = 1;
      engine.gravity.scale = 0.00115;

      const render = Render.create({
        canvas,
        engine,
        options: {
          width: window.innerWidth,
          height: window.innerHeight,
          wireframes: false,
          background: "transparent",
          pixelRatio: Math.min(window.devicePixelRatio || 1, 2)
        }
      });

      const runner = Runner.create();
      const balls = [];
      let walls = [];
      let controlsBody = null;
      let averageFps = 60;
      let lowFpsSince = null;
      let lastFrameTime = performance.now();
      let lastAutoClearTime = 0;
      let statusTimer = null;

      const lowFpsLimit = 20;
      const lowFpsDuration = 2500;
      const autoClearCooldown = 7000;

      const palette = [
        "#22c55e",
        "#38bdf8",
        "#f97316",
        "#f43f5e",
        "#eab308",
        "#a78bfa",
        "#14b8a6"
      ];

      const wordCards = [
        { emoji: "☀️", word: "Sun" },
        { emoji: "⭐", word: "Star" },
        { emoji: "🍎", word: "Apple" },
        { emoji: "🍌", word: "Banana" },
        { emoji: "🍇", word: "Grape" },
        { emoji: "🍓", word: "Berry" },
        { emoji: "🥕", word: "Carrot" },
        { emoji: "🐱", word: "Cat" },
        { emoji: "🐶", word: "Dog" },
        { emoji: "🐟", word: "Fish" },
        { emoji: "🐸", word: "Frog" },
        { emoji: "🦁", word: "Lion" },
        { emoji: "🐵", word: "Monkey" },
        { emoji: "🐼", word: "Panda" },
        { emoji: "🐰", word: "Rabbit" },
        { emoji: "🐢", word: "Turtle" },
        { emoji: "🐝", word: "Bee" },
        { emoji: "🦋", word: "Butterfly" },
        { emoji: "🐘", word: "Elephant" },
        { emoji: "📘", word: "Book" },
        { emoji: "✏️", word: "Pencil" },
        { emoji: "🎒", word: "Bag" },
        { emoji: "🎨", word: "Color" },
        { emoji: "🏠", word: "House" },
        { emoji: "🚪", word: "Door" },
        { emoji: "🪟", word: "Window" },
        { emoji: "🛏️", word: "Bed" },
        { emoji: "🪑", word: "Chair" },
        { emoji: "🧸", word: "Toy" },
        { emoji: "🌳", word: "Tree" },
        { emoji: "🌸", word: "Flower" },
        { emoji: "🌧️", word: "Rain" },
        { emoji: "❄️", word: "Snow" },
        { emoji: "🔥", word: "Fire" },
        { emoji: "💧", word: "Water" },
        { emoji: "🌈", word: "Rainbow" },
        { emoji: "🚗", word: "Car" },
        { emoji: "🚌", word: "Bus" },
        { emoji: "🚲", word: "Bike" },
        { emoji: "🚂", word: "Train" },
        { emoji: "✈️", word: "Plane" },
        { emoji: "🚀", word: "Rocket" },
        { emoji: "⛵", word: "Boat" },
        { emoji: "🌙", word: "Moon" },
        { emoji: "⚽", word: "Ball" },
        { emoji: "🎵", word: "Music" },
        { emoji: "😀", word: "Happy" },
        { emoji: "❤️", word: "Love" },
        { emoji: "👋", word: "Hello" },
        { emoji: "🐦", word: "Bird" }
      ];

      function randomBetween(min, max) {
        return Math.random() * (max - min) + min;
      }

      function clamp(value, min, max) {
        return Math.min(Math.max(value, min), max);
      }

      function pickRandom(items) {
        return items[Math.floor(Math.random() * items.length)];
      }

      function randomSpawnX(radius) {
        const margin = radius + 28;
        const min = Math.min(margin, window.innerWidth / 2);
        const max = Math.max(window.innerWidth - margin, window.innerWidth / 2);
        return randomBetween(min, max);
      }

      function updateCounter() {
        ballCount.textContent = String(balls.length);
      }

      function showStatus(message) {
        statusMessage.textContent = message;
        statusMessage.classList.add("is-visible");

        window.clearTimeout(statusTimer);
        statusTimer = window.setTimeout(() => {
          statusMessage.classList.remove("is-visible");
        }, 2600);
      }

      function makeWalls() {
        const width = window.innerWidth;
        const height = window.innerHeight;
        const thickness = 80;

        if (walls.length) {
          World.remove(engine.world, walls);
        }

        walls = [
          Bodies.rectangle(width / 2, -thickness / 2, width + thickness * 2, thickness, { isStatic: true }),
          Bodies.rectangle(width / 2, height + thickness / 2, width + thickness * 2, thickness, { isStatic: true }),
          Bodies.rectangle(-thickness / 2, height / 2, thickness, height + thickness * 2, { isStatic: true }),
          Bodies.rectangle(width + thickness / 2, height / 2, thickness, height + thickness * 2, { isStatic: true })
        ];

        walls.forEach((wall) => {
          wall.render.visible = false;
        });

        World.add(engine.world, walls);
      }

      function makeControlsBody() {
        const rect = controls.getBoundingClientRect();

        if (controlsBody) {
          World.remove(engine.world, controlsBody);
        }

        controlsBody = Bodies.rectangle(
          rect.left + rect.width / 2,
          rect.top + rect.height / 2,
          rect.width,
          rect.height + 18,
          {
            isStatic: true,
            restitution: 0.72,
            friction: 0.08,
            render: {
              visible: false
            }
          }
        );

        World.add(engine.world, controlsBody);
      }

      function addBall(x = null, y = null) {
        const radius = Math.round(randomBetween(84, 152));
        const color = pickRandom(palette);
        const card = pickRandom(wordCards);
        const minX = radius + 8;
        const maxX = Math.max(window.innerWidth - radius - 8, minX);
        const minY = radius + 8;
        const startX = clamp(x ?? randomSpawnX(radius), minX, maxX);
        const startY = clamp(y ?? radius + 32, minY, Math.max(window.innerHeight / 2, minY));
        const ball = Bodies.circle(startX, startY, radius, {
          restitution: 0.82,
          friction: 0.02,
          frictionAir: 0.003,
          density: 0.0018,
          render: {
            fillStyle: color,
            strokeStyle: "rgba(255, 255, 255, 0.62)",
            lineWidth: 3
          }
        });

        ball.plugin.wordCard = card;
        ball.plugin.radius = radius;

        Body.setVelocity(ball, {
          x: randomBetween(-5, 5),
          y: randomBetween(-2, 1)
        });

        Body.setAngularVelocity(ball, randomBetween(-0.12, 0.12));
        balls.push(ball);
        World.add(engine.world, ball);
        updateCounter();
      }

      function drawBallLabels() {
        const context = render.context;

        context.save();
        context.textAlign = "center";
        context.textBaseline = "middle";

        balls.forEach((ball) => {
          const card = ball.plugin.wordCard;
          const radius = ball.plugin.radius;
          if (!card || !radius) return;

          const { x, y } = ball.position;
          const emojiSize = Math.max(25, Math.round(radius * 0.52));
          const wordSize = Math.max(15, Math.round(radius * 0.28));

          context.fillStyle = "rgba(255, 255, 255, 0.90)";
          context.beginPath();
          context.arc(x, y, radius * 0.72, 0, Math.PI * 2);
          context.fill();

          context.font = `700 ${emojiSize}px system-ui, "Segoe UI Emoji", sans-serif`;
          context.fillStyle = "#111827";
          context.fillText(card.emoji, x, y - radius * 0.20);

          context.font = `900 ${wordSize}px system-ui, sans-serif`;
          context.fillStyle = "#0f172a";
          context.fillText(card.word, x, y + radius * 0.34, radius * 1.28);
        });

        context.restore();
      }

      function clearBalls() {
        if (!balls.length) return;
        World.remove(engine.world, balls.splice(0, balls.length));
        updateCounter();
      }

      function autoClearForPerformance() {
        if (!balls.length) return;

        clearBalls();
        showStatus("Too slow. Cleared!");
      }

      function watchPerformance(now) {
        const delta = Math.max(now - lastFrameTime, 1);
        const currentFps = 1000 / delta;

        averageFps = averageFps * 0.94 + currentFps * 0.06;
        lastFrameTime = now;

        if (balls.length >= 2 && averageFps < lowFpsLimit) {
          lowFpsSince ??= now;
        } else {
          lowFpsSince = null;
        }

        if (
          lowFpsSince &&
          now - lowFpsSince > lowFpsDuration &&
          now - lastAutoClearTime > autoClearCooldown
        ) {
          lastAutoClearTime = now;
          lowFpsSince = null;
          averageFps = 60;
          autoClearForPerformance();
        }

        window.requestAnimationFrame(watchPerformance);
      }

      function resizeStage() {
        const width = window.innerWidth;
        const height = window.innerHeight;

        render.canvas.width = width * render.options.pixelRatio;
        render.canvas.height = height * render.options.pixelRatio;
        render.canvas.style.width = `${width}px`;
        render.canvas.style.height = `${height}px`;
        render.options.width = width;
        render.options.height = height;
        render.bounds.max.x = width;
        render.bounds.max.y = height;

        makeWalls();
        makeControlsBody();
      }

      const mouse = Mouse.create(render.canvas);
      const mouseConstraint = MouseConstraint.create(engine, {
        mouse,
        constraint: {
          stiffness: 0.18,
          render: {
            visible: false
          }
        }
      });

      World.add(engine.world, mouseConstraint);
      render.mouse = mouse;

      Events.on(mouseConstraint, "mousedown", (event) => {
        const target = event.source.body;
        const controlsTop = controls.getBoundingClientRect().top;
        if (!target && event.mouse.position.y < controlsTop - 16) {
          addBall(event.mouse.position.x, event.mouse.position.y);
        }
      });

      addButton.addEventListener("click", () => addBall());
      clearButton.addEventListener("click", clearBalls);
      window.addEventListener("resize", resizeStage);
      window.addEventListener("orientationchange", () => {
        window.setTimeout(resizeStage, 250);
      });

      Events.on(render, "afterRender", drawBallLabels);

      resizeStage();
      Render.run(render);
      Runner.run(runner, engine);
      window.requestAnimationFrame(watchPerformance);

      for (let i = 0; i < 3; i += 1) {
        addBall(null, randomBetween(70, 230));
      }
    </script>
  </body>
</html>
